name: Export Skills

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run export-skills.sh
        run: bash export-skills.sh

      - name: Publish each skill as a release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          for zip in *.zip; do
            skill="${zip%.zip}"
            gh release upload "$tag" "$zip" --clobber
          done
