name: Export Skills

on:
  push:
    branches:
      - main

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run export-skills.sh
        run: bash export-skills.sh

      - name: Upload skill artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skills
          path: "*.zip"
          if-no-files-found: error
